<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2f5f46">
  <title>豆知識メモ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="./" aria-label="豆知識メモ">
        <img class="brand-mark" src="assets/app-icon.svg" alt="">
        <span>
          <strong>豆知識メモ</strong>
          <small>うんちくと出典のストック</small>
        </span>
      </a>
      <div class="top-actions">
        <button class="icon-button" id="installButton" type="button" title="インストール" aria-label="インストール" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 17v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg>
        </button>
        <button class="icon-button" id="exportButton" type="button" title="書き出し" aria-label="書き出し">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v3h16v-3"/></svg>
        </button>
        <label class="icon-button file-button" title="読み込み" aria-label="読み込み">
          <input id="importInput" type="file" accept="application/json">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21V9m0 0 4 4m-4-4-4 4M4 7V4h16v3"/></svg>
        </label>
      </div>
    </header>

    <main class="workspace">
      <section class="editor-surface" aria-labelledby="editorTitle">
        <div class="surface-heading">
          <h1 id="editorTitle">メモを書く</h1>
          <button class="secondary-button compact" id="newButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
            新規
          </button>
        </div>

        <form id="noteForm" class="note-form">
          <input type="hidden" id="noteId">
          <label>
            <span>見出し</span>
            <input id="titleInput" name="title" type="text" autocomplete="off" required maxlength="80" placeholder="例: キリンの首の骨">
          </label>
          <label>
            <span>本文</span>
            <textarea id="bodyInput" name="body" required rows="8" maxlength="2500" placeholder="覚えておきたい内容"></textarea>
          </label>
          <label>
            <span>出典元</span>
            <input id="sourceInput" name="source" type="text" maxlength="300" placeholder="URL、番組名、記事名など">
          </label>
          <label>
            <span>タグ</span>
            <input id="tagsInput" name="tags" type="text" maxlength="160" placeholder="科学, 歴史, ことば">
          </label>
          <section class="media-surface" aria-labelledby="mediaTitle">
            <div class="surface-heading tight">
              <h2 id="mediaTitle">画像・イラスト</h2>
              <button class="secondary-button compact" id="openDrawButton" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"/></svg>
                描く
              </button>
            </div>
            <div class="media-actions">
              <label class="secondary-button media-file-button">
                <input id="imageInput" type="file" accept="image/*">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 8h.01M4 19l5-5 4 4 3-3 4 4"/><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
                画像
              </label>
              <button class="secondary-button" id="removeAllMediaButton" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15M10 11v6M14 11v6"/></svg>
                全削除
              </button>
            </div>
            <div class="attachment-preview" id="attachmentPreview"></div>
          </section>
          <div class="form-actions">
            <button class="primary-button" id="saveButton" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
              保存
            </button>
            <button class="secondary-button" id="clearButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15M10 11v6M14 11v6"/></svg>
              クリア
            </button>
          </div>
        </form>

        <section class="reminder-surface" aria-labelledby="reminderTitle">
          <div class="surface-heading tight">
            <h2 id="reminderTitle">クイズ通知</h2>
            <label class="switch" title="通知">
              <span>通知</span>
              <input id="reminderToggle" type="checkbox">
              <i aria-hidden="true"></i>
            </label>
          </div>
          <div class="reminder-grid">
            <label>
              <span>間隔</span>
              <select id="intervalSelect">
                <option value="15">15分</option>
                <option value="60">1時間</option>
                <option value="360">6時間</option>
                <option value="1440">1日</option>
                <option value="10080">1週間</option>
              </select>
            </label>
            <button class="secondary-button" id="testNotificationButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 6 3 9H3c0-3 3-2 3-9M10 21h4"/></svg>
              今すぐ
            </button>
          </div>
          <p class="status-line" id="notificationStatus">未設定</p>
        </section>

        <section class="sync-surface" aria-labelledby="syncTitle">
          <div class="surface-heading tight">
            <h2 id="syncTitle">クラウド同期</h2>
            <button class="secondary-button compact" id="syncNowButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-14.8 6.9M3 12A9 9 0 0 1 17.8 5.1"/><path d="M21 4v8h-8M3 20v-8h8"/></svg>
              同期
            </button>
          </div>
          <div class="sync-grid">
            <label>
              <span>GitHubトークン</span>
              <input id="syncTokenInput" type="password" autocomplete="off" placeholder="token">
            </label>
            <label>
              <span>Gist ID</span>
              <input id="syncGistInput" type="text" autocomplete="off" placeholder="未作成なら空欄">
            </label>
          </div>
          <div class="sync-actions">
            <button class="secondary-button" id="createCloudButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
              新規
            </button>
            <button class="secondary-button" id="pullCloudButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 17v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg>
              取得
            </button>
            <button class="secondary-button" id="pushCloudButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21V9m0 0 4 4m-4-4-4 4M5 7V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v2"/></svg>
              送信
            </button>
          </div>
          <p class="status-line" id="syncStatus">未設定</p>
        </section>
      </section>

      <section class="list-surface" aria-labelledby="listTitle">
        <div class="list-head">
          <div>
            <h2 id="listTitle">ストック</h2>
            <p id="statsText">0件</p>
          </div>
          <button class="secondary-button compact" id="randomQuizButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
            クイズ
          </button>
        </div>

        <div class="filters">
          <label class="search-box">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z"/></svg>
            <input id="searchInput" type="search" placeholder="検索">
          </label>
          <select id="tagFilter" aria-label="タグで絞り込み">
            <option value="">すべてのタグ</option>
          </select>
          <select id="sortSelect" aria-label="並び替え">
            <option value="updated">更新順</option>
            <option value="created">作成順</option>
            <option value="title">見出し順</option>
            <option value="quiz">復習が古い順</option>
          </select>
        </div>

        <div class="note-list" id="noteList"></div>
      </section>
    </main>
  </div>

  <dialog class="quiz-dialog" id="quizDialog">
    <form method="dialog" class="dialog-close">
      <button class="icon-button" value="cancel" title="閉じる" aria-label="閉じる">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </form>
    <section>
      <p class="eyebrow">クイズ</p>
      <h2 id="quizQuestion">何だったでしょう？</h2>
      <div class="quiz-answer" id="quizAnswer" hidden>
        <p id="quizBody"></p>
        <div class="quiz-media" id="quizMedia"></div>
        <p class="source-text" id="quizSource"></p>
      </div>
      <div class="dialog-actions">
        <button class="primary-button" id="revealAnswerButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
          答えを見る
        </button>
        <button class="secondary-button" id="editQuizButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"/></svg>
          編集
        </button>
      </div>
    </section>
  </dialog>

  <dialog class="drawing-dialog" id="drawingDialog">
    <div class="dialog-close">
      <button class="icon-button" id="closeDrawButton" type="button" title="閉じる" aria-label="閉じる">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <section>
      <div class="surface-heading">
        <div>
          <p class="eyebrow">イラスト</p>
          <h2>手描きメモ</h2>
        </div>
        <div class="draw-tools">
          <label class="color-swatch" title="色">
            <span>色</span>
            <input id="drawColorInput" type="color" value="#2f5f46">
          </label>
          <label class="draw-range" title="太さ">
            <span>太さ</span>
            <input id="drawSizeInput" type="range" min="2" max="28" value="7">
          </label>
          <button class="icon-button" id="undoDrawButton" type="button" title="戻す" aria-label="戻す">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-1"/></svg>
          </button>
          <button class="icon-button" id="clearDrawButton" type="button" title="消去" aria-label="消去">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15M10 11v6M14 11v6"/></svg>
          </button>
        </div>
      </div>
      <div class="canvas-frame">
        <canvas id="drawingCanvas"></canvas>
      </div>
      <div class="dialog-actions">
        <button class="primary-button" id="saveDrawButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
          追加
        </button>
        <button class="secondary-button" id="cancelDrawButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
          キャンセル
        </button>
      </div>
    </section>
  </dialog>

  <template id="emptyTemplate">
    <div class="empty-state">
      <img src="assets/app-icon.svg" alt="">
      <h3>まだメモがありません</h3>
      <p>見出しと本文だけで保存できます。</p>
    </div>
  </template>

  <script src="app.js" defer></script>
</body>
</html>
